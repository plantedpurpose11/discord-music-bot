# ═══════════════════════════════════════════════════════════════════════════
# ❌ REMOVE EMBED - Shown when a song is removed from the queue
# ═══════════════════════════════════════════════════════════════════════════
# 
# AVAILABLE PLACEHOLDERS:
# ─────────────────────────────────────────────────────────────────────────────
# 
# 🎵 REMOVED TRACK:
#   {song}                - Title of the removed song
#   {url}                 - URL of the removed song
#   {author}              - Artist/uploader name
#   {duration}            - Song length (e.g., "3:45")
#   {song_thumbnail}      - URL to song artwork (may be empty for removed)
#
# 📦 QUEUE INFO:
#   {queue_length}        - Remaining songs in queue after removal
#
# 👤 USER & SERVER:
#   {username}            - User who removed the song
#   {requester_avatar}    - Avatar of the user
#   {guild_name}          - Server name
#
# 🤖 BOT INFO:
#   {bot_name}            - Bot's display name
#   {bot_avatar}          - Bot's avatar URL
#
# ═══════════════════════════════════════════════════════════════════════════

title: "🗑️ Song Removed"
description: |
  **Removed from Queue:**
  🎵 [{song}]({url})
  🎤 **Artist:** {author}
  ⏱️ **Duration:** {duration}
  
  📋 **Remaining in Queue:** {queue_length} songs

footer:
  text: "Removed by {actionby_username}"
  icon: "{requester_avatar}"

author:
  name: "{bot_name}"
  icon: "{bot_avatar}"

thumbnail: ""
image: ""
color: "#ED4245"
timestamp: true
